<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MAĞAZALAR</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#888;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:'Oswald',sans-serif;font-weight:700;gap:14px;}

/* SELECTOR */
.selector-wrap{width:340px;}
.selector-label{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#ddd;letter-spacing:2px;margin-bottom:6px;display:block;text-align:center;}
.mag-pills{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.mag-pill{padding:5px 10px;background:rgba(0,0,0,0.35);color:#ddd;border:1px solid rgba(255,255,255,0.15);font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;letter-spacing:.5px;cursor:pointer;border-radius:2px;display:flex;align-items:center;gap:4px;transition:all .15s;}
.mag-pill:hover{background:rgba(0,0,0,0.55);}
.mag-pill.active{background:#111;color:#C9A84C;border-color:#C9A84C;}

/* MODE BUTTONS */
.demo-btns{display:flex;gap:6px;}
.open-btn{padding:8px 14px;background:#111;color:#fff;border:none;font-family:'Oswald',sans-serif;font-weight:700;font-size:12px;letter-spacing:2px;cursor:pointer;}
.open-btn.b{background:#444;}
.open-btn.c{background:#777;}

/* OVERLAY & POPUP */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:10000;}
#pop{display:none;position:fixed;bottom:116px;left:50%;transform:translateX(-50%);width:320px;height:520px;background:#fff;border:3px double #111;border-bottom:none;flex-direction:column;overflow:hidden;z-index:10001;}
#pop.open{display:flex;animation:su .25s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:translateX(-50%) translateY(640px);}to{transform:translateX(-50%) translateY(0);}}

/* HEADER */
#hd{height:64px;flex-shrink:0;background:#fff;border-bottom:3px double #111;display:flex;align-items:center;padding:0 10px;position:relative;}
#hd .bina-ico{width:35px;height:35px;object-fit:contain;flex-shrink:0;}
#hd .center{position:absolute;left:0;right:0;top:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
#hd .lf{height:54px;max-width:220px;object-fit:contain;}
#hd .right-btns{margin-left:auto;display:flex;align-items:center;gap:2px;}
#hd .ico-btn{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;justify-content:center;}
#hd .ico-btn img{width:22px;height:22px;object-fit:contain;}

/* TABS */
#tab-bar{display:none;flex-shrink:0;border-bottom:1px solid #f0f0f0;}
#tab-bar.show{display:flex;}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;letter-spacing:1.5px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab.active{color:#111;border-bottom:2px solid #111;}

/* SCREENS */
#screens{flex:1;position:relative;overflow:hidden;min-height:0;}
.sc{display:none;position:absolute;inset:0;background:#fff;flex-direction:column;overflow-y:auto;}
.sc.on{display:flex;}
.sc::-webkit-scrollbar{width:2px;}
.sc::-webkit-scrollbar-thumb{background:#eee;}

/* GENEL */
.sc-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;letter-spacing:1px;padding:7px 12px 3px;display:block;border-bottom:1px solid #f0f0f0;}
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;border-bottom:1px solid #f0f0f0;}
.row-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#111;}
.row-val{font-size:13px;color:#111;}
.row-val.green{color:#2e7d32;}
.row-val.gold{color:#B8860B;}
.row-val.grey{color:#aaa;}
.row-val.red{color:#8B3030;}

/* SAHİPSİZ */
.bina-info{padding:14px 12px;border-bottom:1px solid #f0f0f0;}
.bina-info-name{font-size:22px;color:#111;letter-spacing:1px;display:block;margin-bottom:4px;}
.bina-info-desc{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#C9A84C;letter-spacing:.5px;line-height:1.5;}
.urun-tags{display:flex;flex-wrap:wrap;gap:5px;padding:10px 12px;border-bottom:1px solid #f0f0f0;}
.urun-tag{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#111;border:1px solid #e0e0e0;padding:3px 8px;}
.satin-al-bottom{margin-top:auto;padding:12px;}
.fiyat-blok{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.fiyat-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#888;letter-spacing:1px;}
.fiyat-val{font-size:22px;color:#111;letter-spacing:1px;}
.rank-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;letter-spacing:.5px;}
.btn-full{width:100%;padding:12px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:3px;cursor:pointer;}

/* KASA */
.kasa-hero{padding:16px 12px;border-bottom:1px solid #f0f0f0;}
.kasa-hero-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;letter-spacing:1px;display:block;margin-bottom:4px;}
.kasa-hero-val{font-size:36px;color:#2e7d32;letter-spacing:1px;}
.kasa-hero-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;margin-top:3px;display:block;}

/* MAL */
.mal-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f0f0f0;}
.mal-left{display:flex;align-items:center;gap:8px;}
.mal-ico{font-size:16px;}
.mal-name{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#111;}
.mal-fiyat{font-family:'Oswald',sans-serif;font-size:10px;color:#888;font-weight:600;margin-top:1px;}
.mal-right{display:flex;align-items:center;gap:6px;}
.mal-adet{font-size:14px;color:#111;min-width:36px;text-align:right;}
.mal-bar-wrap{width:50px;height:3px;background:#f0f0f0;}
.mal-bar{height:100%;background:#111;}

/* SAVUNMA */
.sav-hero{padding:12px;border-bottom:1px solid #f0f0f0;}
.sav-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;letter-spacing:1px;display:block;margin-bottom:6px;}
.sav-bar-wrap{height:5px;background:#f0f0f0;margin-bottom:5px;}
.sav-bar{height:100%;background:#111;transition:width .3s;}
.sav-nums{display:flex;justify-content:space-between;}
.sav-cur{font-size:18px;color:#111;}
.sav-max{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#C9A84C;align-self:flex-end;padding-bottom:2px;}
.sav-auto{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#2e7d32;margin-top:4px;display:block;}
.mermi-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid #f0f0f0;}
.mermi-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:11px;color:#111;}
.mermi-sub{font-family:'Oswald',sans-serif;font-size:10px;color:#C9A84C;font-weight:600;margin-top:1px;}
.mermi-adet{font-size:14px;color:#111;min-width:50px;text-align:right;}

/* BUTONLAR */
.btn-wrap{padding:8px 12px 10px;margin-top:auto;}
.btn{width:100%;padding:11px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:13.5px;letter-spacing:2px;cursor:pointer;margin-bottom:7px;}
.btn:last-child{margin-bottom:0;}
.btn.outline{background:#fff;color:#111;border:1px solid #ddd;}
.btn.danger{background:#fff;color:#8B3030;border:1px solid #e0c0c0;}

/* INPUT */
.inp-wrap{padding:10px 12px;border-bottom:1px solid #f0f0f0;}
.inp-lbl{font-family:'Oswald',sans-serif;font-size:8px;font-weight:600;color:#aaa;letter-spacing:1px;display:block;margin-bottom:3px;}
.inp{width:100%;border:none;border-bottom:2px solid #111;outline:none;font-family:'Oswald',sans-serif;font-weight:700;font-size:22px;color:#111;background:transparent;padding:2px 0;}
.sel{width:100%;border:none;border-bottom:2px solid #111;outline:none;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;color:#111;background:transparent;padding:2px 0;margin-bottom:8px;}

/* TOAST */
#toast{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;padding:6px 14px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}

/* FOOTER */
#ft{height:36px;flex-shrink:0;border-top:1px solid #f0f0f0;background:#fff;display:flex;align-items:center;justify-content:center;}
#ft button{background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
#ft img{height:40px;opacity:.5;}
.urun-ico-img + .urun-ico-fb{display:none;}
.urun-ico-fb{display:inline;}
</style>
</head>
<body>

<!-- MAĞAZA SELECTOR -->

  <button class="open-btn c" onclick="openPop('benim')">BENİM</button>
</div>

<div id="ov" onclick="closePop()"></div>
<div id="pop">

  <!-- HEADER -->

    <img class="bina-ico" id="hd-ico" src="" onerror="this.style.display='none';this.parentNode.querySelector('.hd-ico-fb').style.display='flex'"><span class="hd-ico-fb" style="display:none;font-size:28px;width:48px;height:48px;align-items:center;justify-content:center;"></span>

      <button class="ico-btn">

             onerror="this.style.display='none'" ">

    </div>
  </div>

  <!-- TABS (sadece BENİM'de görünür) -->
  <div id="tab-bar">
    <div class="tab active" onclick="switchTab(0)">KASA</div>
    <div class="tab" onclick="switchTab(1)">MAL</div>
    <div class="tab" onclick="switchTab(2)">SAVUNMA</div>

  <div id="screens">
    <!-- SAHİPSİZ -->
    <div class="sc" id="sc-satin"></div>
    <!-- BAŞKASININ -->
    <div class="sc" id="sc-baskasi"></div>
    <!-- BENİM: KASA / MAL / SAVUNMA -->
    <div class="sc" id="sc0"></div>
    <div class="sc" id="sc1"></div>
    <div class="sc" id="sc2"></div>
  </div>

  <div id="toast"></div>

  <!-- FOOTER -->
  <div id="ft">
    <button onclick="closePop()">
      <img src="https://mericaltinors1983-max.github.io/hustler/close_icon.png"
           onerror="this.style.display='none'" ">

</div>

var currentIdx = 0;

var MAG_ICONS_FB = {
  'BAR':'🍸','OTEL':'🏨','GYM':'🏋️','AVM':'🏬','PAWN SHOP':'💰'
};

var MAG = MAGAZALAR[0];
var MODE = 'sahipsiz';

// BUILD PILLS
(function(){
  var icons = ['🍸','🏨','🏋','🏬','💰'];
  var c = document.getElementById('mag-pills');
  MAGAZALAR.forEach(function(m, i){
    var d = document.createElement('div');
    d.className = 'mag-pill' + (i===0?' active':'');
    d.innerHTML = '<span>'+icons[i]+'</span>'+m.isim;
    d.onclick = function(){
      currentIdx = i;
      MAG = MAGAZALAR[i];
      document.querySelectorAll('.mag-pill').forEach(function(p,pi){p.classList.toggle('active',pi===i);});
      var _mIco = document.getElementById('hd-ico');
      _mIco.style.display = '';
      _mIco.parentNode.querySelector('.hd-ico-fb').style.display = 'none';
      _mIco.parentNode.querySelector('.hd-ico-fb').textContent = MAG_ICONS_FB[MAG.isim] || '';
      _mIco.src = BASE + MAG.ico;
    };
    c.appendChild(d);
  });
})();

function openPop(mode){
  MODE = mode;
  MAG = MAGAZALAR[currentIdx];
  var _mIco2 = document.getElementById('hd-ico');
  _mIco2.style.display = '';
  _mIco2.parentNode.querySelector('.hd-ico-fb').style.display = 'none';
  _mIco2.parentNode.querySelector('.hd-ico-fb').textContent = MAG_ICONS_FB[MAG.isim] || '';
  _mIco2.src = BASE + MAG.ico;
  document.getElementById('ov').style.display = 'block';
  document.getElementById('pop').classList.add('open');
  render();
}
function closePop(){
  document.getElementById('ov').style.display = 'none';
  document.getElementById('pop').classList.remove('open');
}

function render(){
  var tabBar = document.getElementById('tab-bar');
  document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});

  if(MODE === 'benim'){
    tabBar.classList.add('show');
    renderKasa(); renderMal(); renderSavunma();
    switchTab(0);
  } else if(MODE === 'baskasi'){
    tabBar.classList.remove('show');
    renderBaskasi();
    document.getElementById('sc-baskasi').classList.add('on');
  } else {
    tabBar.classList.remove('show');
    renderSatinAl();
    document.getElementById('sc-satin').classList.add('on');
  }
}

function switchTab(i){
  document.querySelectorAll('.tab').forEach(function(t,idx){t.classList.toggle('active',idx===i);});
  ['sc0','sc1','sc2'].forEach(function(id,idx){
    var el = document.getElementById(id);
    el.classList.remove('on');
    if(idx===i) el.classList.add('on');
  });
}

function renderSatinAl(){
  var sc = document.getElementById('sc-satin');
  var tags = MAG.tags.map(function(t){return '<span class="urun-tag">'+t+'</span>';}).join('');
  var binaFiyatStr = '$' + MAG.binaFiyat.toLocaleString();
  var urunListesi = MAG.tags.map(function(t){return t.split(' \u2014 ')[0];}).join(' \u00b7 ');
  sc.innerHTML =
    '<div class="bina-info">'+
      '<span class="bina-info-name">'+MAG.isim+'</span>'+
      '<span class="bina-info-desc">Otomatik sat\u0131\u015f \u2014 '+urunListesi+'</span>'+
    '</div>'+
    '<span class="sc-lbl">SATILAN MALLAR</span>'+
    '<div class="urun-tags">'+tags+'</div>'+
    '<div class="satin-al-bottom">'+
      '<div class="fiyat-blok">'+
        '<div><span class="fiyat-lbl">SATIN ALMA F\u0130YATI</span><div class="rank-lbl">'+MAG.minRank+'</div></div>'+
        '<span class="fiyat-val">'+binaFiyatStr+'</span>'+
      '</div>'+
      '<button class="btn-full" onclick="satinAl()">B\u0130NAYI SATIN AL</button>'+
    '</div>';
}

function renderBaskasi(){
  var sc = document.getElementById('sc-baskasi');
  sc.innerHTML =
    '<div class="btn-wrap" style="margin-top:auto;"><button class="btn danger" onclick="saldir()">⚔️ SALDIR</button></div>';
}

function renderKasa(){
  var sc = document.getElementById('sc0');
  sc.innerHTML =
    '<div class="kasa-hero">'+
      '<span class="kasa-hero-lbl">BİRİKEN KASA</span>'+
      '<div class="kasa-hero-val">'+MAG.kasaVal+'</div>'+
      '<span class="kasa-hero-sub">'+MAG.kasaSub+'</span>'+
    '</div>'+
    '<div class="btn-wrap">'+
      '<button class="btn" onclick="kasaCek()">KASAYI ÇEK</button>'+
      '<button class="btn danger" onclick="binaySat()">BİNAYI SAT</button>'+
    '</div>';
}

function renderMal(){
  var sc = document.getElementById('sc1');
  var rows = MAG.mallar.map(function(m){
    return '<div class="mal-row">'+
      '<div class="mal-left"><span class="mal-ico">'+(m.png?'<img src="'+BASE+m.png+'" class="urun-ico-img" style="width:18px;height:18px;object-fit:contain;vertical-align:middle;"><span class="urun-ico-fb">'+m.ico+'</span>':m.ico)+'</span>'+
        '<div><div class="mal-name">'+m.isim+'</div><div class="mal-fiyat">'+m.fiyat+' / adet</div></div>'+
      '</div>'+
      '<div class="mal-right"><div>'+
        '<div class="mal-adet">'+m.adet.toLocaleString()+'</div>'+
        '<div class="mal-bar-wrap"><div class="mal-bar" style="width:'+m.pct+'%"></div></div>'+
      '</div></div>'+
    '</div>';
  }).join('');

  var opts = MAG.malSecenekler.map(function(s,i){
    return '<option value="'+i+'">'+s+'</option>';
  }).join('');

  sc.innerHTML =
    '<span class="sc-lbl">MEVCUT STOK</span>'+rows+
    '<span class="sc-lbl" style="margin-top:4px;">MAL İŞLEMİ</span>'+
    '<div class="inp-wrap">'+
      '<select class="sel" id="mal-urun">'+opts+'</select>'+
      '<span class="inp-lbl">MİKTAR</span>'+
      '<input id="mal-miktar" type="number" min="1" placeholder="0" class="inp">'+
    '</div>'+
    '<div class="btn-wrap">'+
      '<button class="btn" onclick="malYukle()">YÜKLE</button>'+
      '<button class="btn outline" onclick="malCek()">ÇEK</button>'+
    '</div>';
}

function renderSavunma(){
  var sc = document.getElementById('sc2');
  sc.innerHTML =
    '<div class="sav-hero">'+
      '<span class="sav-lbl">SAVUNMA MERMİLERİ</span>'+
      '<div class="sav-bar-wrap"><div class="sav-bar" style="width:62%"></div></div>'+
      '<div class="sav-nums"><span class="sav-cur">62.000</span><span class="sav-max">/ 100.000 MAX</span></div>'+
      '<span class="sav-auto">✓ OTOMATİK: 10.000 MERMİ — %100 KS</span>'+
    '</div>'+
    '<div class="mermi-row"><div><div class="mermi-lbl">OTOMATİK SAVUNMA</div><div class="mermi-sub">Her saldırıda ateşlenir</div></div><span class="row-val green">10.000</span></div>'+
    '<div class="mermi-row"><div><div class="mermi-lbl">EK MERMİ (YÜKLENMİŞ)</div><div class="mermi-sub">Otomatikten sonra devreye girer</div></div><span class="mermi-adet">52.000</span></div>'+
    '<span class="sc-lbl" style="margin-top:4px;">MERMİ İŞLEMİ</span>'+
    '<div class="inp-wrap"><span class="inp-lbl">MİKTAR</span><input id="mermi-miktar" type="number" min="1" placeholder="0" class="inp"></div>'+
    '<div class="btn-wrap">'+
      '<button class="btn" onclick="mermiYukle()">MERMİ YÜKLE</button>'+
      '<button class="btn outline" onclick="mermiCek()">MERMİ ÇEK</button>'+
    '</div>';
}

function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = 1;
  setTimeout(function(){t.style.opacity=0;}, 2200);
}

function satinAl(){ toast(MAG.isim+' satın alındı — $'+MAG.binaFiyat.toLocaleString()); }
function saldir(){ toast('⚔️ Saldırı başlatılıyor...'); }
function kasaCek(){ toast('Kasa çekildi — '+MAG.kasaVal); }
function binaySat(){ if(confirm('Binayı satmak istediğine emin misin?')) toast('Bina satışa çıkarıldı'); }
function malYukle(){
  var s = document.getElementById('mal-urun');
  var m = document.getElementById('mal-miktar');
  if(!m||!m.value||m.value<=0){toast('Miktar gir');return;}
  toast(m.value+' '+MAG.malSecenekler[s.value||0]+' yüklendi');
  m.value='';
}
function malCek(){
  var s = document.getElementById('mal-urun');
  var m = document.getElementById('mal-miktar');
  if(!m||!m.value||m.value<=0){toast('Miktar gir');return;}
  toast(m.value+' '+MAG.malSecenekler[s.value||0]+' geri çekildi');
  m.value='';
}
function mermiYukle(){
  var m = document.getElementById('mermi-miktar');
  if(!m||!m.value||m.value<=0){toast('Miktar gir');return;}
  toast(Number(m.value).toLocaleString()+' mermi yüklendi');
  m.value='';
}
function mermiCek(){
  var m = document.getElementById('mermi-miktar');
  if(!m||!m.value||m.value<=0){toast('Miktar gir');return;}
  toast(Number(m.value).toLocaleString()+' mermi geri çekildi');
  m.value='';
}
</script>
</body>
</html>
