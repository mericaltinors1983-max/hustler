<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>KAMU BİNALARI</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#888;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;font-family:'Oswald',sans-serif;font-weight:700;gap:10px;}

/* ── SELECTOR BAR ── */
.selector{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;padding:8px;}
.sel-btn{padding:7px 12px;background:rgba(0,0,0,.4);color:#ccc;border:1px solid rgba(255,255,255,.15);font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:1px;cursor:pointer;display:flex;align-items:center;gap:5px;transition:all .12s;}
.sel-btn:hover{background:rgba(0,0,0,.6);}
.sel-btn.on{background:#111;color:#fff;border-color:#555;}

/* demo toggles */
.demo-row{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;}
.dt{padding:4px 10px;background:rgba(0,0,0,.35);color:#bbb;border:1px solid rgba(255,255,255,.12);font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;letter-spacing:1px;cursor:pointer;}
.dt.on{background:#111;color:#C9A84C;border-color:#C9A84C;}

/* ── OVERLAY & POPUP ── */
#ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:10000;}
#pop{display:none;position:fixed;bottom:116px;left:50%;transform:translateX(-50%);width:320px;height:520px;background:#fff;border:3px double #111;border-bottom:none;flex-direction:column;overflow:hidden;z-index:10001;}
#pop.open{display:flex;animation:su .25s cubic-bezier(.4,0,.2,1);}
@keyframes su{from{transform:translateX(-50%) translateY(640px);}to{transform:translateX(-50%) translateY(0);}}

/* ── HEADER ── */
#hd{height:64px;flex-shrink:0;background:#fff;border-bottom:3px double #111;display:flex;align-items:center;padding:0 10px;position:relative;}
#hd .r{margin-left:auto;display:flex;align-items:center;gap:2px;}
#hd .ib{background:none;border:none;cursor:pointer;padding:2px;display:flex;align-items:center;}
#hd .ib img{width:22px;height:22px;object-fit:contain;}

/* ── BAL STRIP (banka only) ── */
#bal-strip{display:none;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
#bal-strip.show{display:flex;}
.bal-item{flex:1;padding:7px 8px;text-align:center;border-right:1px solid #f0f0f0;}
.bal-item:last-child{border-right:none;}
.bal-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:8px;color:#888;display:block;font-weight:700;}
.bal-val{font-size:14px;color:#111;display:block;margin-top:1px;font-weight:700;}
.bal-val.green{color:#2e7d32;}

/* ── TAB BAR ── */
#tab-bar{display:none;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
#tab-bar.show{display:flex;}
.tab{flex:1;padding:9px 4px;text-align:center;font-size:11px;letter-spacing:1.5px;color:#aaa;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;font-weight:700;}
.tab.active{color:#111;border-bottom:2px solid #111;}

/* ── SCREENS ── */
#screens{flex:1;position:relative;overflow:hidden;min-height:0;}
.sc{display:none;position:absolute;inset:0;background:#fff;flex-direction:column;overflow-y:auto;}
.sc.on{display:flex;}
.sc::-webkit-scrollbar{width:2px;}
.sc::-webkit-scrollbar-thumb{background:#eee;}

/* ── BANKA STYLES ── */
.special-bar{background:#111;padding:6px 12px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
.special-bar-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#888;letter-spacing:.5px;}
.sc-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;color:#888;letter-spacing:1px;padding:6px 12px 3px;display:block;border-bottom:1px solid #f0f0f0;font-weight:700;flex-shrink:0;}
.inp-wrap{padding:7px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.inp-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;color:#888;display:block;margin-bottom:2px;font-weight:700;}
.inp{width:100%;border:none;outline:none;font-family:'Oswald',sans-serif;font-weight:700;font-size:19px;letter-spacing:1px;color:#111;background:transparent;font-weight:700;}
.inp::placeholder{color:#ddd;}
.chips{display:flex;gap:4px;flex-wrap:wrap;padding:6px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.ch{padding:3px 8px;border:1px solid #ddd;background:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;color:#2e7d32;cursor:pointer;font-weight:700;}
.ch.sel,.ch:hover{background:#111;color:#fff;border-color:#111;}
.preview{margin:0 12px 6px;padding:7px 10px;border:1px solid #f0f0f0;display:none;flex-shrink:0;}
.prev-row{display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #f8f8f8;}
.prev-row:last-child{border:none;}
.prev-lbl{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;color:#888;font-weight:700;}
.prev-val{font-size:13px;color:#111;font-weight:700;}
.prev-val.green{color:#2e7d32;}
.btn-wrap{padding:8px 12px 10px;margin-top:auto;flex-shrink:0;}
.btn{width:100%;padding:11px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;font-weight:700;}
.btn:active{opacity:.85;}
.nap-bar{margin:5px 12px 2px;padding:5px 9px;border:1px solid #C9A84C44;display:none;flex-shrink:0;}
.nap-bar.show{display:block;}
.nap-bar-txt{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;color:#C9A84C;font-weight:700;}
.yat-mini{margin:3px 12px;padding:7px 10px;border:1px solid #f0f0f0;display:flex;align-items:center;flex-shrink:0;}
.yat-mini-amt{font-size:14px;color:#C9A84C;letter-spacing:.5px;font-weight:700;flex:1;}
.yat-mini-detail{display:flex;gap:10px;align-items:center;}
.yat-mini-oran{font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;color:#2e7d32;font-weight:700;}
.yat-mini-timer{font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;color:#888;font-weight:700;min-width:44px;text-align:right;}
.yat-mini-badge{font-family:'Oswald',sans-serif;font-weight:700;font-size:8px;padding:2px 5px;font-weight:700;margin-left:6px;}
.badge-act{background:#f5f5f5;color:#888;}
.badge-done{background:#2e7d32;color:#fff;}
.sure-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:6px 12px;border-bottom:1px solid #f0f0f0;flex-shrink:0;}
.sure-card{border:1.5px solid #e0e0e0;padding:7px 4px;text-align:center;cursor:pointer;position:relative;transition:border-color .12s;}
.sure-card.sel{border-color:#111;}
.sure-card.sel::after{content:'✓';position:absolute;top:2px;right:4px;font-size:9px;color:#111;}
.sure-saat{font-size:17px;color:#111;display:block;line-height:1;}
.sure-label{font-family:'Oswald',sans-serif;font-weight:700;font-size:8px;color:#aaa;display:block;font-weight:700;margin-top:1px;}
.sure-oran{font-size:13px;color:#2e7d32;display:block;margin-top:3px;font-weight:700;}
.sure-oran.nap{color:#C9A84C;}
.max-warn{margin:10px 12px;padding:9px 10px;border:1px solid #f0f0f0;text-align:center;flex-shrink:0;}
.max-warn-txt{font-family:'Oswald',sans-serif;font-weight:700;font-size:9px;color:#aaa;font-weight:700;}

/* ── TRANSPORT STYLES ── */
.slbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#888;letter-spacing:1px;padding:6px 12px 4px;border-bottom:1px solid #f0f0f0;display:block;flex-shrink:0;}
.city-row{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid #f5f5f5;cursor:pointer;}
.city-row:active{background:#fafafa;}
.city-meta{flex:1;}
.city-name{font-size:14px;color:#111;letter-spacing:.5px;}
.city-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;margin-top:1px;}
.city-sure{font-size:12px;color:#111;flex-shrink:0;margin-right:6px;}
.city-arr{font-size:16px;color:#e0e0e0;flex-shrink:0;}
.kac-info{margin:10px 12px;border:1.5px solid #f0f0f0;padding:12px;}
.kac-head{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.kac-ico{font-size:24px;}
.kac-title{font-size:17px;color:#111;letter-spacing:.5px;display:block;}
.kac-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;}
.kac-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;}
.kac-cell{background:#f9f9f9;padding:6px 8px;}
.kac-cell-lbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:8px;color:#aaa;display:block;}
.kac-cell-val{font-size:13px;color:#111;display:block;margin-top:1px;}
.status-ok{margin:8px 12px;padding:8px 10px;background:#f0faf0;border:1px solid #bbf7d0;}
.status-ok-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#166534;}
.status-err{margin:8px 12px;padding:8px 10px;background:#fff5f5;border:1px solid #fee2e2;}
.status-err-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#c62828;}
.btn-kac{margin:4px 12px 12px;display:block;width:calc(100% - 24px);padding:13px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;}
.btn-kac:disabled{background:#e5e7eb;color:#9ca3af;cursor:default;}
.open-info{margin:8px 12px;padding:8px 10px;background:#f9f9f9;border:1px solid #f0f0f0;}
.open-info-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#666;}

/* ── SAFE HOUSE STYLES ── */
.sh-status{margin:12px;padding:14px 12px;border:1.5px solid #111;display:flex;align-items:center;gap:12px;}
.sh-shield{font-size:32px;flex-shrink:0;}
.sh-status-txt{flex:1;}
.sh-title{font-size:20px;color:#111;letter-spacing:1px;display:block;line-height:1;}
.sh-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#2e7d32;letter-spacing:1px;margin-top:3px;display:block;}
.sh-timer-wrap{margin:0 12px 8px;border:1px solid #f0f0f0;}
.sh-timer-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-bottom:1px solid #f8f8f8;}
.sh-timer-row:last-child{border:none;}
.sh-tlbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;letter-spacing:1px;}
.sh-tval{font-size:15px;color:#111;letter-spacing:.5px;}
.sh-tval.gold{color:#C9A84C;}
.sh-tval.green{color:#2e7d32;}
.sh-gazete{margin:0 12px 8px;border:1px solid #ddd;}
.sh-gaz-head{background:#111;padding:5px 10px;text-align:center;}
.sh-gaz-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;color:#fff;letter-spacing:3px;font-weight:700;}
.sh-gaz-date{font-family:'Oswald',sans-serif;font-weight:700;font-size:8px;color:#aaa;letter-spacing:1px;display:block;margin-top:1px;}
.sh-haber{padding:6px 10px;border-bottom:1px solid #f5f5f5;}
.sh-haber:last-child{border:none;}
.sh-haber-hl{font-family:'Oswald',sans-serif;font-weight:700;font-size:10px;color:#111;font-weight:700;line-height:1.3;}
.sh-haber-sub{font-family:'Oswald',sans-serif;font-weight:700;font-size:8px;color:#aaa;margin-top:2px;display:block;font-weight:700;}
.sh-cost-wrap{margin:12px;border:1.5px solid #f0f0f0;}
.sh-cost-row{display:flex;justify-content:space-between;padding:8px 10px;border-bottom:1px solid #f8f8f8;}
.sh-cost-row:last-child{border:none;}
.sh-clbl{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;letter-spacing:1px;}
.sh-cval{font-size:14px;color:#111;}
.sh-cval.red{color:#c62828;}
.sh-enter-wrap{padding:8px 12px 10px;margin-top:auto;}
.sh-btn-enter{width:100%;padding:13px;border:none;background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:14px;letter-spacing:2px;cursor:pointer;}
.sh-btn-exit{width:100%;padding:11px;border:1.5px solid #c62828;background:#fff;color:#c62828;font-family:'Oswald',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;cursor:pointer;margin-top:6px;}

/* ── HAPİSHANE STYLES ── */
.info-strip{display:flex;align-items:center;gap:10px;margin:12px;padding:10px 12px;background:#f9f9f9;border:1px solid #f0f0f0;}
.info-strip-ico{font-size:22px;}
.info-strip-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:10px;color:#aaa;letter-spacing:.5px;line-height:1.5;}
.transport-card-btn{display:flex;align-items:center;padding:14px 12px;border:1.5px solid #e0e0e0;cursor:pointer;gap:12px;margin:0 12px;}
.transport-card-btn:active{background:#f8f8f8;}
.tcb-ico{font-size:24px;flex-shrink:0;}
.tcb-txt{flex:1;}
.tcb-title{font-size:16px;color:#111;letter-spacing:.5px;display:block;}
.tcb-sub{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#aaa;margin-top:2px;display:block;}
.tcb-arr{font-size:20px;color:#ccc;flex-shrink:0;}

/* ── BOTTOM ── */
#bot{flex-shrink:0;border-top:3px double #111;}
#bot button{width:100%;padding:8px;background:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#bot button img{width:50px;height:50px;object-fit:contain;}

/* ── TOAST ── */
#toast{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);background:#111;color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;padding:6px 14px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;z-index:200;}
#toast.green{background:#2e7d32;}
#toast.red{background:#c62828;}
#toast.show{opacity:1;}

/* bottom bar sim */
.bot-sim{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:320px;height:116px;background:#111;display:flex;align-items:center;justify-content:center;z-index:9999;}
.bot-sim-txt{font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#333;letter-spacing:2px;}
</style>
</head>
<body>

<!-- SELECTOR -->
<div class="selector">
  <button class="sel-btn" onclick="acPopup('banka',this)">🏦 BANKA</button>
  <button class="sel-btn" onclick="acPopup('havalimani',this)">✈️ HAVALİMANI</button>
  <button class="sel-btn" onclick="acPopup('liman',this)">⚓ LİMAN</button>
  <button class="sel-btn" onclick="acPopup('gar',this)">🚂 TREN GARI</button>
  <button class="sel-btn" onclick="acPopup('hapishane',this)">⛓️ HAPİSHANE</button>
  <button class="sel-btn" onclick="acPopup('safehouse',this)">🛡️ SAFE HOUSE</button>
</div>
<div style="display:flex;gap:5px;flex-wrap:wrap;justify-content:center;padding:4px 8px;">
  <span style="font-family:'Oswald',sans-serif;font-weight:600;font-size:9px;color:#ddd;letter-spacing:1px;width:100%;text-align:center;margin-bottom:2px;">ŞEHİR (SPECIAL TEST)</span>
  <select id="sehir-sel" onchange="CURRENT_SEHIR=this.value" style="background:#222;color:#fff;border:1px solid #555;font-family:'Oswald',sans-serif;font-size:10px;padding:4px 8px;letter-spacing:1px;width:200px;">
    <option value="default">— NORMAL ŞEHİR —</option>
    <option value="napoli">NAPOLİ (Banka)</option>
    <option value="istanbul">İSTANBUL (Liman)</option>
    <option value="newyork">NEW YORK (Liman)</option>
    <option value="hamburg">HAMBURG (Liman)</option>
    <option value="miami">MİAMİ (Havalimanı)</option>
  </select>
</div>

<!-- DEMO TOGGLES -->
<div class="demo-row" id="demo-row" style="display:none;">
  <button class="dt on" id="dt-a" onclick="setDemo('a',this)">— DEMO A</button>
  <button class="dt"    id="dt-b" onclick="setDemo('b',this)">— DEMO B</button>
  <button class="dt"    id="dt-c" onclick="setDemo('c',this)">— DEMO C</button>
</div>

<div id="ov" onclick="closePop()"></div>
<div class="bot-sim"><span class="bot-sim-txt">BOTTOM BAR</span></div>

<!-- POPUP -->
<div id="pop">
  <!-- HEADER -->
  <div id="hd">
    <div id="hd-ico-wrap" style="width:35px;height:35px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:26px;"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
      <img src="https://mericaltinors1983-max.github.io/hustler/lafamilia-2.png"
           style="height:54px;max-width:200px;object-fit:contain;"
           onerror="this.style.display='none'">
    </div>
    <div class="r">
      <button class="ib"><img src="https://mericaltinors1983-max.github.io/hustler/icon_info.png" onerror="this.style.display='none'" "></button>
      <button class="ib" onclick="closePop()"><img src="https://mericaltinors1983-max.github.io/hustler/close_icon.png" onerror="this.style.display='none'" "></button>
    </div>
  </div>

  <!-- BAL STRIP (banka) -->
  <div id="bal-strip">
    <div class="bal-item"><span class="bal-lbl">NAKİT</span><span class="bal-val green" id="bal-nakit">$5,842,500</span></div>
    <div class="bal-item"><span class="bal-lbl">FAİZDE</span><span class="bal-val" id="bal-faiz">$0</span></div>
    <div class="bal-item"><span class="bal-lbl">AİLE KASA</span><span class="bal-val" id="bal-kasa">$125K</span></div>
  </div>

  <!-- TAB BAR -->
  <div id="tab-bar"></div>

  <!-- SCREENS -->
  <div id="screens"></div>

  <!-- BOTTOM -->
  <div id="bot">
    <button onclick="closePop()">
      <img src="https://mericaltinors1983-max.github.io/hustler/close_icon.png"
           onerror="this.style.display='none'" ">
    </button>
  </div>
  <div id="toast"></div>
</div>

<script>
// ══ SHARED STATE ═══════════════════════════════════════
var PLAYER = {
  rank:7, city:'istanbul', country:'turkey',
  hasGemi:true, hasUcak:true,
};
var CASH=5842500, AILE=125000, SEHIR='istanbul';
var _activeType = null;
var CURRENT_SEHIR = 'default';

var BINA_SPECIAL_KAMU = {
  'napoli_banka':      { bonus:'ÖZEL FAİZ',   desc:'6s:%5 / 12s:%7 / 24s:%10'              },
  'newyork_liman':     { bonus:'+%10 SATIŞ',  desc:'Port malları %10 yüksek fiyata satılır' },

  'miami_havalimani':  { bonus:'-%25 SÜRE',   desc:'Airport ticaret süresi %25 kısa'        },
};

function getSpecialKamu(type) {
  var key = CURRENT_SEHIR + '_' + type;
  return BINA_SPECIAL_KAMU[key] || null;
}

function specialBarHtml(type) {
  var sp = getSpecialKamu(type);
  if (!sp) return '';
  return '<div class="special-bar"><span class="special-bar-txt">⭐ '+sp.bonus+' — '+sp.desc+'</span></div>';
}

// ══ SHARED DATA ════════════════════════════════════════
var ULKELER = [
  {id:'turkey',  name:'TÜRKİYE',  flag:'🇹🇷', sehirler:[
    {id:'istanbul',name:'İSTANBUL',liman:true},{id:'izmir',name:'İZMİR',liman:true},
    {id:'trabzon',name:'TRABZON',liman:true},{id:'diyarbakir',name:'DİYARBAKIR',liman:false}]},
  {id:'italy',   name:'İTALYA',   flag:'🇮🇹', sehirler:[
    {id:'napoli',name:'NAPOLİ',liman:true},{id:'sicilya',name:'SİCİLYA',liman:true},
    {id:'milano',name:'MİLANO',liman:false},{id:'roma',name:'ROMA',liman:true}]},
  {id:'germany', name:'ALMANYA',  flag:'🇩🇪', sehirler:[
    {id:'berlin',name:'BERLİN',liman:false},{id:'hamburg',name:'HAMBURG',liman:true},
    {id:'munih',name:'MÜNİH',liman:false},{id:'frankfurt',name:'FRANKFURT',liman:false}]},
  {id:'russia',  name:'RUSYA',    flag:'🇷🇺', sehirler:[
    {id:'moskova',name:'MOSKOVA',liman:false},{id:'stpetersburg',name:'ST. PETERSBURG',liman:true},

function acPopup(type, btn) {
  _activeType = type;
  document.querySelectorAll('.sel-btn').forEach(function(b){b.classList.remove('on');});
  if(btn) btn.classList.add('on');

  // header icon — wrapper div ile, outerHTML sorununu önler
  var wrap = document.getElementById('hd-ico-wrap');
  var m = POPUP_META[type];
  wrap.innerHTML = '<img src="'+m.ico+'" style="width:35px;height:35px;object-fit:contain;" onerror="this.style.display=\'none\';var fb=this.parentElement.querySelector(\'.ico-fb\');if(fb){fb.style.display=\'flex\';}">' + '<span class="ico-fb" style="display:none;font-size:26px;align-items:center;justify-content:center;">'+m.icoFb+'</span>';

  // bal strip
  document.getElementById('bal-strip').className = (type==='banka') ? 'show' : '';

  // demo row
  setupDemoRow(type);

  // render content
  renderPopupContent(type);

  document.getElementById('ov').style.display='block';
  document.getElementById('pop').classList.add('open');
}

function renderPopupContent(type) {
  if (type==='banka')      { renderBanka(); return; }
  if (type==='hapishane')  { renderHapishane(); return; }
  if (type==='safehouse')  { renderSafehouse(); return; }
  renderTransport(type);
}

function setupDemoRow(type) {
  var row = document.getElementById('demo-row');
  var a=document.getElementById('dt-a'),b=document.getElementById('dt-b'),c=document.getElementById('dt-c');
  if (type==='banka') {
    row.style.display='flex';
    a.textContent='İSTANBUL'; b.textContent='NAPOLİ'; c.style.display='none';
    a.classList.add('on'); b.classList.remove('on');
  } else if (type==='havalimani') {
    row.style.display='flex';
    a.textContent='UÇAK VAR · RANK 7'; b.textContent='UÇAK YOK'; c.textContent='RANK 5'; c.style.display='';
    a.classList.add('on'); b.classList.remove('on'); c.classList.remove('on');
    PLAYER.hasUcak=true; PLAYER.rank=7;
  } else if (type==='liman') {
    row.style.display='flex';
    a.textContent='GEMİ VAR · RANK 7'; b.textContent='GEMİ YOK'; c.textContent='RANK 3'; c.style.display='';
    a.classList.add('on'); b.classList.remove('on'); c.classList.remove('on');
    PLAYER.hasGemi=true; PLAYER.rank=7;
  } else if (type==='gar') {
    row.style.display='flex';
    a.textContent='RANK 7'; b.textContent='RANK 1'; c.style.display='none';
    a.classList.add('on'); b.classList.remove('on');
    PLAYER.rank=7;
  } else if (type==='safehouse') {
    row.style.display='flex';
    a.textContent='DIŞARIDA'; b.textContent='İÇERİDE'; c.style.display='none';
    a.classList.add('on'); b.classList.remove('on');
    SH_INSIDE=false;
  } else {
    row.style.display='none';
  }
}

function setDemo(slot, el) {
  document.querySelectorAll('.dt').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  var t = _activeType;
  if (t==='banka') {
    SEHIR = (slot==='a') ? 'istanbul' : 'napoli';
    selSure=null; renderFaiz();
  } else if (t==='havalimani') {
    if(slot==='a'){PLAYER.hasUcak=true;PLAYER.rank=7;}
    else if(slot==='b'){PLAYER.hasUcak=false;PLAYER.rank=7;}
    else{PLAYER.hasUcak=true;PLAYER.rank=5;}
    renderTransport('havalimani');
  } else if (t==='liman') {
    if(slot==='a'){PLAYER.hasGemi=true;PLAYER.rank=7;}
    else if(slot==='b'){PLAYER.hasGemi=false;PLAYER.rank=7;}
    else{PLAYER.hasGemi=true;PLAYER.rank=3;}
    renderTransport('liman');
  } else if (t==='gar') {
    PLAYER.rank = (slot==='a') ? 7 : 1;
    renderTransport('gar');
  } else if (t==='safehouse') {
    SH_INSIDE = (slot==='b');
    renderSafehouse();
  }
}

function renderTrSeyahat(type) {
  var m   = TRANSPORT_META[type];
  var sc  = document.getElementById('sc-seyahat');
  var ayni=[], kita=[], farkli=[];
  ULKELER.forEach(function(u) {
    var mes = (u.id===PLAYER.country)?'ic':((MESAFE[PLAYER.country]||{})[u.id]||'farkli');
    u.sehirler.forEach(function(s) {
      if(s.id===PLAYER.city) return;
      if(m.limanOnly && !s.liman) return;
      var sure = m.sure[mes]||m.sure.farkli;
      var item={s:s,u:u,sure:sure};
      if(u.id===PLAYER.country)                   ayni.push(item);
      else if(mes==='ayni_kita'||mes==='komsu')   kita.push(item);
      else                                        farkli.push(item);
    });
  });
  function grp(bas,liste){
    if(!liste.length) return '';
    var h='<span class="slbl">'+bas+'</span>';
    liste.forEach(function(e){
      h+='<div class="city-row" onclick="sehirSec(\''+e.s.id+'\',\''+e.u.id+'\')">'+
         '<div class="city-meta"><div class="city-name">'+e.s.name+'</div>'+
         '<div class="city-sub">'+e.u.flag+' '+e.u.name+(e.s.liman?' · ⚓':'')+'</div></div>'+
         '<div class="city-sure">'+m.ico+' '+e.sure+'</div>'+
         '<div class="city-arr">›</div></div>';
    });
    return h;
  }
  var html=grp('AYNI ÜLKE',ayni)+grp('AYNI KITADAKİ YAKIN ŞEHİRLER',kita)+grp('FARKLI KITADAKİ UZAK ŞEHİRLER',farkli);
  if(!html) html='<div style="padding:30px;text-align:center;font-family:Oswald,sans-serif;font-size:11px;color:#ccc;">Uygun şehir yok</div>';
  sc.innerHTML=html;
}

function renderTrKacak(type) {
  var m   = TRANSPORT_META[type];
  var sc  = document.getElementById('sc-kacakcilik');
  var rankOK = PLAYER.rank>=m.rankMin;
  var aracOK = m.hasArac();
  var canUse = rankOK&&aracOK;
  var spBar = specialBarHtml(type);
  var html=spBar+'<div class="kac-info">'+
    '<div class="kac-head"><span class="kac-ico">'+m.ico+'</span>'+
    '<div><span class="kac-title">'+m.kacInfo.bas+'</span><span class="kac-sub">'+m.kacInfo.sub+'</span></div></div>'+
    '<div class="kac-grid">'+
    '<div class="kac-cell"><span class="kac-cell-lbl">İÇ SEYAHAT</span><span class="kac-cell-val">'+m.kacInfo.ic+'</span></div>'+
    '<div class="kac-cell"><span class="kac-cell-lbl">AYNI KITA</span><span class="kac-cell-val">'+m.kacInfo.kita+'</span></div>'+
    '<div class="kac-cell"><span class="kac-cell-lbl">FARKLI KITA</span><span class="kac-cell-val">'+m.kacInfo.farkli+'</span></div>'+
    '</div></div>';
  if(!rankOK) html+='<div class="status-err"><span class="status-err-txt">🔒 Rank '+m.rankMin+' gerekli — mevcut: '+PLAYER.rank+'</span></div>';
  else if(!aracOK) html+='<div class="status-err"><span class="status-err-txt">🔒 '+m.aracAdi+' gerekli — marketten al</span></div>';
  else html+='<div class="status-ok"><span class="status-ok-txt">✓ '+m.aracAdi+' hazır — kanal açık</span></div>';
  html+='<button class="btn-kac"'+(canUse?'':' disabled')+' onclick="kacakcilikAc()">'+m.ico+' '+m.kanalLbl+' KAÇAKÇILIĞINA GİR</button>';
  sc.innerHTML=html;
}

function sehirSec(sehirId, ulkeId) {
  var u=ULKELER.find(function(x){return x.id===ulkeId;});
  var s=u?u.sehirler.find(function(x){return x.id===sehirId;}):null;
  if(!s) return;
  _cfSehir=s; _cfUlke=u;
  var mes=(u.id===PLAYER.country)?'ic':((MESAFE[PLAYER.country]||{})[u.id]||'farkli');
  var m=TRANSPORT_META[_cfType];
  document.getElementById('cf-rota').textContent=currentSehirAdi()+' → '+s.name;
  document.getElementById('cf-sure').textContent=m.sure[mes]||m.sure.farkli;
  showSc('confirm');
}

function currentSehirAdi(){
  for(var i=0;i<ULKELER.length;i++)
    for(var j=0;j<ULKELER[i].sehirler.length;j++)
      if(ULKELER[i].sehirler[j].id===PLAYER.city) return ULKELER[i].sehirler[j].name;
  return PLAYER.city.toUpperCase();
}
function confirmGeri(){ showSc('seyahat'); }
function yolculukBaslat(){
  if(!_cfSehir) return;
  var m=TRANSPORT_META[_cfType];
  toast(m.ico+' '+_cfSehir.name+' yolculuğu başladı');
  setTimeout(closePop,1400);
}

  var m=TRANSPORT_META[_cfType];

    '</div>'+
    '<div class="sc" id="sc-kasa">'+
      '<div style="margin:10px 12px 6px;padding:10px;border:1px solid #2e7d3233;">'+
        '<div style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:8px;color:#2e7d32aa;margin-bottom:3px;font-style:italic;font-weight:700;">AİLE KASASI — THE CORLEONES</div>'+
        '<div style="font-size:20px;color:#2e7d32;letter-spacing:1px;font-weight:700;" id="kasa-val">$125,000</div>'+
      '</div>'+
      '<span class="sc-lbl">MİKTAR</span>'+
      '<div class="inp-wrap"><span class="inp-lbl">TUTAR ($)</span><input class="inp" id="k-miktar" type="number" placeholder="0" oninput="kUpd()"></div>'+
      '<div class="chips" id="k-chips"></div>'+
      '<div class="preview" id="k-prev">'+
        '<div class="prev-row"><span class="prev-lbl">KASAYA EKLENECEK</span><span class="prev-val green" id="k-pv">$0</span></div>'+
        '<div class="prev-row"><span class="prev-lbl">NAKİT KALAN</span><span class="prev-val" id="k-pk">$0</span></div>'+
      '</div>'+
      '<div class="btn-wrap" style="margin-top:auto;"><button class="btn" onclick="kasayaAt()">🏦 KASAYA GÖNDER</button></div>'+
    '</div>'+
    '<div class="sc on" id="sc-faiz"></div>';

  buildChips('g-chips',[10000,50000,100000,500000,5000000],function(v){document.getElementById('g-miktar').value=v;gUpd();});
  buildChips('k-chips',[10000,50000,100000,500000,5000000],function(v){document.getElementById('k-miktar').value=v;kUpd();});
  renderFaiz();
}

function bTab(n,el){
  document.querySelectorAll('#tab-bar .tab').forEach(function(t){t.classList.remove('active');});
  document.querySelectorAll('.sc').forEach(function(s){s.classList.remove('on');});
  el.classList.add('active');
  document.getElementById('sc-'+n).classList.add('on');
  if(n==='faiz') renderFaiz();
}

function renderFaiz(){
  var sc=document.getElementById('sc-faiz'); if(!sc) return;
  var tb=getTb(),nap=SEHIR==='napoli',say=yatirimlar.length,html='';
  html+='<div class="nap-bar'+(nap?' show':'')+'"><span class="nap-bar-txt">⭐ NAPOLİ — Özel faiz oranları aktif</span></div>';
  html+='<span class="sc-lbl">AKTİF YATIRIMLAR ('+say+'/'+MAX_Y+')</span>';
  if(!say){
    html+='<div style="padding:5px 12px 3px;"><span style="font-family:\'Oswald\',sans-serif;font-weight:700;font-size:9px;color:#ccc;font-weight:700;">Henüz yatırım yok</span></div>';
  } else {
    yatirimlar.forEach(function(y){
      var kal=Math.max(0,y.bitis-Date.now()),done=kal<=0,ts=done?'TAMAMLANDI':fmtTime(kal);
      html+='<div class="yat-mini"><span class="yat-mini-amt">$'+fmt(y.miktar)+'</span>'+
        '<div class="yat-mini-detail"><span class="yat-mini-oran">%'+y.oran+' · +$'+fmt(y.kazanc)+'</span>'+
        '<span class="yat-mini-timer'+(done?' done':'')+'" id="yt-'+y.id+'">'+ts+'</span>'+
        '<span class="yat-mini-badge '+(done?'badge-done':'badge-act')+'">'+(done?'✓':'AKT')+'</span></div></div>';
    });
  }
  if(say<MAX_Y){
    html+='<span class="sc-lbl">YENİ YATIRIM</span><div class="sure-grid">';
    tb.forEach(function(f){
      html+='<div class="sure-card'+(selSure===f.id?' sel':'')+'" onclick="selCard(\''+f.id+'\')">'+
        '<span class="sure-saat">'+f.saat+'S</span><span class="sure-label">SAAT</span>'+
        '<span class="sure-oran'+(nap?' nap':'')+'">%'+f.oran+'</span></div>';
    });
    html+='</div><span class="sc-lbl">MİKTAR (MİN $100K)</span>'+
      '<div class="inp-wrap"><span class="inp-lbl">YATIRILACAK ($)</span><input class="inp" id="f-inp" type="number" placeholder="0" oninput="fUpd()"></div>'+
      '<div class="chips" id="f-chips"></div>'+
      '<div class="preview" id="f-prev">'+
        '<div class="prev-row"><span class="prev-lbl">FAİZ KAZANCI</span><span class="prev-val green" id="fp-k">+$0</span></div>'+
        '<div class="prev-row"><span class="prev-lbl">SÜRE SONUNDA TOPLAM</span><span class="prev-val" id="fp-t">$0</span></div>'+
      '</div>'+
      '<div class="btn-wrap"><button class="btn" id="f-btn" onclick="yatir()">📈 YATIRIM YAP</button></div>';
  } else {
    html+='<div class="max-warn"><span class="max-warn-txt">Max 3 yatırım aktif — Para otomatik cebe girer</span></div>';
  }
  sc.innerHTML=html;
  if(say<MAX_Y){
    buildChips('f-chips',[100000,250000,500000,1000000,5000000],function(v){var el=document.getElementById('f-inp');if(el){el.value=v;fUpd();}});
    if(selSure){var el=document.getElementById('f-inp');if(el&&el.value)fUpd();}
  }
  updBal(); startTimers();
}

function selCard(id){selSure=id;renderFaiz();var el=document.getElementById('f-inp');if(el&&el.value)fUpd();}
function fUpd(){
  var v=parseInt(document.getElementById('f-inp').value)||0;
  var f=getTb().find(function(x){return x.id===selSure;});
  var prv=document.getElementById('f-prev');
  if(!f||v<MIN_Y||v>CASH){if(prv)prv.style.display='none';return;}
  var kaz=Math.floor(v*f.oran/100);
  document.getElementById('fp-k').textContent='+$'+fmt(kaz);
  document.getElementById('fp-t').textContent='$'+fmt(v+kaz);
  if(prv)prv.style.display='block';
}
function yatir(){
  if(!selSure){toast('Süre seç!','red');return;}
  var v=parseInt((document.getElementById('f-inp')||{}).value)||0;
  var f=getTb().find(function(x){return x.id===selSure;});
  if(!f)return;
  if(v<MIN_Y){toast('Min $100K gerekli!','red');return;}
  if(v>CASH){toast('Yetersiz bakiye!','red');return;}
  if(yatirimlar.length>=MAX_Y){toast('Slot dolu!','red');return;}
  CASH-=v;
  var kazanc=Math.floor(v*f.oran/100);
  yatirimlar.push({id:++yId,miktar:v,oran:f.oran,saat:f.saat,bitis:Date.now()+f.dkMs/DEMO_HZ,kazanc:kazanc});
  toast('$'+fmt(v)+' yatırıldı · '+f.saat+'s · %'+f.oran,'green');
  selSure=null; renderFaiz();
}
function startTimers(){
  clearInterval(tInt);if(!yatirimlar.length)return;
  tInt=setInterval(function(){
    var now=Date.now(),toRemove=[];
    yatirimlar.forEach(function(y){
      var kal=Math.max(0,y.bitis-now);
      if(kal<=0){if(!y._done){y._done=true;toRemove.push(y.id);}}
      else{var el=document.getElementById('yt-'+y.id);if(el)el.textContent=fmtTime(kal);}
    });
    toRemove.forEach(function(id){
      var idx=yatirimlar.findIndex(function(y){return y.id===id;});
      if(idx<0)return;
      var y=yatirimlar[idx];CASH+=y.miktar+y.kazanc;
      toast('+$'+fmt(y.miktar+y.kazanc)+' — cebe girdi','green');
      yatirimlar.splice(idx,1);
    });
    if(toRemove.length){clearInterval(tInt);renderFaiz();}
  },1000);
}
function gUpd(){var v=parseInt(document.getElementById('g-miktar').value)||0;var p=document.getElementById('g-prev');p.style.display=v>0?'block':'none';if(v>0){document.getElementById('g-pv').textContent='$'+fmt(v);document.getElementById('g-pk').textContent='$'+fmt(Math.max(0,CASH-v));}}
function gonder(){var k=(document.getElementById('g-kisi').value||'').trim();var m=parseInt(document.getElementById('g-miktar').value)||0;if(!k){toast('Kullanıcı adı gir!','red');return;}if(m<=0){toast('Miktar gir!','red');return;}if(m>CASH){toast('Yetersiz!','red');return;}CASH-=m;updBal();toast(k+'\'e $'+fmt(m)+' gönderildi!','green');document.getElementById('g-kisi').value='';document.getElementById('g-miktar').value='';document.getElementById('g-prev').style.display='none';}
function kUpd(){var v=parseInt(document.getElementById('k-miktar').value)||0;var p=document.getElementById('k-prev');p.style.display=v>0?'block':'none';if(v>0){document.getElementById('k-pv').textContent='$'+fmt(v);document.getElementById('k-pk').textContent='$'+fmt(Math.max(0,CASH-v));}}
function kasayaAt(){var m=parseInt(document.getElementById('k-miktar').value)||0;if(m<=0){toast('Miktar gir!','red');return;}if(m>CASH){toast('Yetersiz!','red');return;}CASH-=m;AILE+=m;updBal();document.getElementById('kasa-val').textContent='$'+fmt(AILE);toast('$'+fmt(m)+' kasaya!','green');document.getElementById('k-miktar').value='';document.getElementById('k-prev').style.display='none';}
function updBal(){
  var n=document.getElementById('bal-nakit'),f=document.getElementById('bal-faiz'),k=document.getElementById('bal-kasa');
  if(n)n.textContent='$'+fmt(CASH);
  if(f){var tot=yatirimlar.reduce(function(a,y){return a+y.miktar;},0);f.textContent='$'+fmt(tot);}
  if(k)k.textContent='$'+fmt(AILE);
}

// ══ SAFE HOUSE ════════════════════════════════════════
var SH_INSIDE = false;
var SH_TIMER_INT = null;

var SH_MALIYET = 100000; // saatlik — tüm ranklar sabit | para bitince otomatik çıkılır

var SH_HABERLER = [
  {hl:'UNDERGROUND BOSS ESCAPES POLICE RAID IN MILAN',sub:'Sources say the operation was tipped off hours before the raid'},
  {hl:'GOLD PRICES SURGE AS CARTEL DEMAND INCREASES',sub:'Black market rates hit record highs across three continents'},
  {hl:'PORT AUTHORITY CRACKS DOWN ON CONTAINER TRAFFIC',sub:'New inspection protocols delay shipments by up to 48 hours'},
  {hl:'MYSTERIOUS FIRE AT DOWNTOWN PAWN SHOP',sub:'No arrests made — investigators suspect arson'},
  {hl:'CRIME FAMILIES NEGOTIATE CITY BORDER DISPUTES',sub:'Neutral ground meeting held at undisclosed location'},
];

function shKalanSure() {
  var rate = SH_MALIYET; // saatlik
  var rateMs = rate / (60*60*1000); // ms başına maliyet
  var kalanMs = Math.floor(CASH / rateMs);
  return kalanMs;
}

function renderSafehouse() {
  document.getElementById('tab-bar').className='';
  clearInterval(SH_TIMER_INT);
  var rank = PLAYER.rank;
  var rate = SH_MALIYET;

  if (!SH_INSIDE) {
    // DIŞARIDA — giriş ekranı
    var kalanMs = shKalanSure();
    var kalanSaat = (kalanMs / 3600000).toFixed(1);
    document.getElementById('screens').innerHTML =
      '<div class="sc on" id="sc-sh" style="overflow-y:auto;">'+
      '<div class="info-strip">'+
        '<span style="font-size:22px;">🛡️</span>'+
        '<span style="font-family:\'Oswald\',sans-serif;font-weight:600;font-size:10px;color:#aaa;letter-spacing:.5px;line-height:1.5;">KAMU BİNASI — SATIN ALINAMAZ · SALDIRILAMAZ<br>İçeri girince saldırıya uğramazsın</span>'+
      '</div>'+
      '<div class="sh-cost-wrap">'+
        '<div class="sh-cost-row"><span class="sh-clbl">RANK</span><span class="sh-cval">'+rank+'</span></div>'+
        '<div class="sh-cost-row"><span class="sh-clbl">SAATLİK ÜCRET</span><span class="sh-cval red">$'+fmt(rate)+'</span></div>'+
        '<div class="sh-cost-row"><span class="sh-clbl">NAKİT</span><span class="sh-cval">$'+fmt(CASH)+'</span></div>'+
        '<div class="sh-cost-row"><span class="sh-clbl">KALABILECEĞIN SÜRE</span><span class="sh-cval green">~'+kalanSaat+' saat</span></div>'+
      '</div>'+
      '<div class="sh-enter-wrap">'+
        '<button class="sh-btn-enter" onclick="shGir()">🛡️ SAFE HOUSE\'A GİR</button>'+
      '</div>'+
      '</div>';
  } else {
    // İÇERİDE — güvendesin ekranı
    var now = Date.now();
    var kalanMs = shKalanSure();
    var gazetHtml = '';
    SH_HABERLER.forEach(function(h){
      gazetHtml += '<div class="sh-haber"><div class="sh-haber-hl">'+h.hl+'</div><span class="sh-haber-sub">'+h.sub+'</span></div>';
    });
    document.getElementById('screens').innerHTML =
      '<div class="sc on" id="sc-sh" style="overflow-y:auto;">'+
      '<div class="sh-status">'+
        '<span class="sh-shield">🛡️</span>'+
        '<div class="sh-status-txt">'+
          '<span class="sh-title">GÜVENDESİN</span>'+
          '<span class="sh-sub">✓ SALDIRILAMAZ · ✓ TESPİT EDİLEMEZ</span>'+
        '</div>'+
      '</div>'+
      '<div class="sh-timer-wrap">'+
        '<div class="sh-timer-row"><span class="sh-tlbl">SAATLİK ÜCRET</span><span class="sh-tval red" style="color:#c62828;">$'+fmt(SH_MALIYET)+'</span></div>'+
        '<div class="sh-timer-row"><span class="sh-tlbl">NAKİT</span><span class="sh-tval" id="sh-nakit">$'+fmt(CASH)+'</span></div>'+
        '<div class="sh-timer-row"><span class="sh-tlbl">TAHMÎNEN ÇIKIŞ</span><span class="sh-tval gold" id="sh-kalan">'+fmtShKalan(kalanMs)+'</span></div>'+
      '</div>'+
      '<div class="sh-gazete">'+
        '<div class="sh-gaz-head">'+
          '<span class="sh-gaz-title">THE UNDERGROUND GAZETTE</span>'+
          '<span class="sh-gaz-date">'+shTarih()+'</span>'+
        '</div>'+
        gazetHtml+
      '</div>'+
      '<div class="sh-enter-wrap">'+
        '<button class="sh-btn-exit" onclick="shCik()">⚠ SAFE HOUSE\'TAN ÇIK</button>'+
      '</div>'+
      '</div>';

    // timer — her saniye güncelle
    SH_TIMER_INT = setInterval(function(){
      var km = shKalanSure();
      var el = document.getElementById('sh-kalan');
      var nk = document.getElementById('sh-nakit');
      if (!el) { clearInterval(SH_TIMER_INT); return; }
      if (km <= 0) {
        clearInterval(SH_TIMER_INT);
        SH_INSIDE = false;
        toast('Para bitti — Safe House\'tan çıkıldı!','red');
        renderSafehouse();
        return;
      }
      el.textContent = fmtShKalan(km);
      if (nk) nk.textContent = '$'+fmt(CASH);
    }, 1000);
  }
}

function fmtShKalan(ms){
  var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);
  m=m%60;
  if(h>=1) return h+'s '+m+'dk';
  if(m>=1) return m+'dk '+s%60+'sn';
  return s+'sn';
}

function shTarih(){
  var d=new Date();
  var gunler=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var aylar=['January','February','March','April','May','June','July','August','September','October','November','December'];
  return gunler[d.getDay()]+', '+aylar[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear();
}

function shGir(){
  var rate = SH_MALIYET;
  if(CASH < rate){ toast('Yetersiz bakiye!','red'); return; }
  SH_INSIDE = true;
  toast('🛡️ Safe House\'a girildi');
  renderSafehouse();
}

function shCik(){
  clearInterval(SH_TIMER_INT);
  SH_INSIDE = false;
  toast('Safe House\'tan çıkıldı');
  renderSafehouse();
}

// ══ SHARED UTILS ══════════════════════════════════════
function fmt(n){return n.toLocaleString('en-US');}
function fmtTime(ms){var s=Math.floor(ms/1000),m=Math.floor(s/60),h=Math.floor(m/60);s=s%60;m=m%60;if(h>0)return h+'s '+m+'dk';if(m>0)return m+'dk '+s+'sn';return s+'sn';}
function buildChips(id,amounts,cb){
  var c=document.getElementById(id);if(!c)return;c.innerHTML='';
  amounts.forEach(function(v){
    var d=document.createElement('div');d.className='ch';
    d.textContent=v>=1000000?'$'+(v/1000000)+'M':'$'+(v/1000)+'K';
    d.onclick=function(){document.querySelectorAll('#'+id+' .ch').forEach(function(x){x.classList.remove('sel');});d.classList.add('sel');cb(v);};
    c.appendChild(d);
  });
}
function toast(msg,type){var t=document.getElementById('toast');t.textContent=msg;t.className=(type||'')+' show';clearTimeout(t._r);t._r=setTimeout(function(){t.className='';},2600);}
function closePop(){
  document.getElementById('ov').style.display='none';
  document.getElementById('pop').classList.remove('open');
  clearInterval(tInt);
  clearInterval(SH_TIMER_INT);
  document.querySelectorAll('.sel-btn').forEach(function(b){b.classList.remove('on');});
}
</script>
