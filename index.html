<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>UNDERGROUND — Şehir Haritası</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #080b12; overflow: hidden; font-family: 'Oswald', sans-serif; }
    #canvas-container { width: 100vw; height: 100vh; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: #080b12;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 999; transition: opacity 0.6s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading h1 {
      color: #f0c040; font-size: 36px; letter-spacing: 6px;
      text-shadow: 0 0 30px rgba(240,192,64,0.6);
    }
    #load-status { color: #666; font-size: 13px; margin-top: 14px; letter-spacing: 1px; }
    #progress-bar {
      width: 220px; height: 2px;
      background: #1a1a1a; margin-top: 18px; border-radius: 1px;
    }
    #progress-fill {
      height: 100%; background: #f0c040; width: 0%;
      transition: width 0.2s ease; border-radius: 1px;
    }

    /* ── Title ── */
    #ui-title {
      position: fixed; top: 18px; left: 18px;
      color: #f0c040; font-size: 24px; letter-spacing: 5px;
      font-weight: 700; text-shadow: 0 0 16px rgba(240,192,64,0.4);
      pointer-events: none;
    }

    /* ── Hint ── */
    #ui-hint {
      position: fixed; top: 18px; right: 18px;
      color: #444; font-size: 11px; text-align: right;
      line-height: 1.7; pointer-events: none;
    }

    /* ── Info Panel ── */
    #info-panel {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: rgba(8,11,18,0.95);
      border: 2px solid #f0c040;
      padding: 12px 24px; border-radius: 3px;
      text-align: center; min-width: 200px;
      display: none; pointer-events: none;
      animation: slideUp 0.2s ease;
    }
    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(10px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    #info-name { color: #f0c040; font-size: 17px; font-weight: 700; letter-spacing: 1px; }
    #info-type { color: #888; font-size: 12px; margin-top: 4px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── Minimap ── */
    #minimap {
      position: fixed; bottom: 20px; right: 18px;
      width: 80px; height: 80px;
      background: rgba(8,11,18,0.85);
      border: 1px solid #333;
      border-radius: 2px; overflow: hidden;
    }
    #minimap canvas { display: block; }

    /* ── Zoom buttons ── */
    #zoom-btns {
      position: fixed; bottom: 110px; right: 18px;
      display: flex; flex-direction: column; gap: 4px;
    }
    .zoom-btn {
      width: 36px; height: 36px;
      background: rgba(8,11,18,0.9); border: 1px solid #333;
      color: #f0c040; font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 2px; transition: border-color 0.2s;
    }
    .zoom-btn:hover { border-color: #f0c040; }

    /* ── Stats bar (top center) ── */
    #stats-bar {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      background: rgba(8,11,18,0.85); border: 1px solid #222;
      padding: 6px 16px; border-radius: 2px;
      color: #555; font-size: 11px; letter-spacing: 1px;
      pointer-events: none;
    }
    #stats-bar span { color: #f0c040; }
  </style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <h1>UNDERGROUND</h1>
  <p id="load-status">Şehir inşa ediliyor...</p>
  <div id="progress-bar"><div id="progress-fill"></div></div>
</div>

<!-- Main Canvas -->
<div id="canvas-container"></div>

<!-- UI -->
<div id="ui-title">UNDERGROUND</div>
<div id="ui-hint">
  Sürükle — Döndür<br>
  Pinch / Scroll — Zoom<br>
  Tıkla — Bina Bilgisi
</div>
<div id="info-panel">
  <div id="info-name">—</div>
  <div id="info-type">—</div>
</div>
<div id="stats-bar">
  Bina: <span id="stat-buildings">0</span> &nbsp;|&nbsp;
  Sektör: <span>ENDÜSTRİYEL BÖLGE</span>
</div>
<div id="zoom-btns">
  <button class="zoom-btn" id="btn-zoom-in">+</button>
  <button class="zoom-btn" id="btn-zoom-out">−</button>
</div>
<div id="minimap"><canvas id="minimap-canvas" width="80" height="80"></canvas></div>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script>
/* ──────────────────────────────────────────────
   CITY LAYOUT — [model, x, z, rotY, name, type]
────────────────────────────────────────────────*/
const CITY = [
  /* ── Block NW: Ağır Sanayi ── */
  ['building-a', -16, -16, 0,             'Çelik Fabrikası',    'Fabrika'],
  ['building-b', -10, -16, Math.PI,       'Kimya Tesisi',       'Fabrika'],
  ['building-l', -16, -10, Math.PI/2,     'Büyük Depo',         'Depo'],
  ['building-q', -10, -10, 0,             'İşleme Merkezi',     'Fabrika'],
  ['building-r', -13, -13, Math.PI/4,     'Kontrol Kulesi',     'İdari'],

  /* ── Block NE: Kimya Bölgesi ── */
  ['building-c', 10,  -16, Math.PI,       'Montaj Fabrikası',   'Fabrika'],
  ['building-d', 16,  -16, Math.PI/2,     'Kimya Deposu',       'Depo'],
  ['building-e', 10,  -10, 0,             'Arıtma Tesisi',      'Fabrika'],
  ['building-m', 16,  -10, -Math.PI/2,    'Güç Merkezi',        'Enerji'],
  ['building-n', 13,  -13, 0,             'Bakım Hangarı',      'Servis'],

  /* ── Block SW: Atölyeler ── */
  ['building-f', -16, 10,  Math.PI,       'Metal Atölyesi',     'Atölye'],
  ['building-g', -10, 10,  Math.PI/2,     'Küçük Depo',         'Depo'],
  ['building-h', -16, 16,  0,             'Makine Atölyesi',    'Atölye'],
  ['building-i', -10, 16,  Math.PI,       'Onarım Birimi',      'Servis'],
  ['building-j', -13, 13,  -Math.PI/4,    'Güvenlik Merkezi',   'İdari'],

  /* ── Block SE: Yönetim ── */
  ['building-k', 10,  10,  0,             'Ana Depo',           'Depo'],
  ['building-o', 16,  10,  Math.PI/2,     'İkmal Deposu',       'Depo'],
  ['building-p', 10,  16,  Math.PI,       'Yönetim Binası',     'İdari'],
  ['building-s', 16,  16,  -Math.PI/2,    'Güvenlik Üssü',      'İdari'],
  ['building-t', 13,  13,  Math.PI/2,     'Silah Deposu',       'Depo'],

  /* ── Bacalar ── */
  ['chimney-large',  -18, -18, 0,         'Büyük Baca',         'Tesis'],
  ['chimney-large',   18, -18, 0,         'Büyük Baca',         'Tesis'],
  ['chimney-medium', -18,  18, 0,         'Orta Baca',          'Tesis'],
  ['chimney-small',   18,  18, 0,         'Küçük Baca',         'Tesis'],
  ['chimney-basic',    0,  -6, 0,         'Fabrika Bacası',     'Tesis'],

  /* ── Merkez: Tank ── */
  ['detail-tank',      0,   0, 0,         'Yakıt Tankı',        'Tesis'],
];

/* ──────────────────────────────────────────────
   SCENE SETUP
────────────────────────────────────────────────*/
const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080b12);
scene.fog = new THREE.Fog(0x080b12, 40, 90);

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 200);
camera.position.set(28, 24, 36);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setSize(W(), H());
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

/* ── Controls ── */
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(0, 2, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.minDistance = 6;
controls.maxDistance = 70;
controls.maxPolarAngle = Math.PI / 2.1;
controls.screenSpacePanning = false;

/* ── Lighting ── */
// Ambient — deep night blue
const ambient = new THREE.AmbientLight(0x1a2a40, 1.4);
scene.add(ambient);

// Moon — cool directional
const moon = new THREE.DirectionalLight(0x4060a0, 1.2);
moon.position.set(-20, 30, 20);
moon.castShadow = true;
moon.shadow.camera.near = 0.5;
moon.shadow.camera.far = 100;
moon.shadow.camera.left = -35;
moon.shadow.camera.right = 35;
moon.shadow.camera.top = 35;
moon.shadow.camera.bottom = -35;
moon.shadow.mapSize.width = 2048;
moon.shadow.mapSize.height = 2048;
moon.shadow.bias = -0.001;
scene.add(moon);

// Warm fill from front
const fill = new THREE.DirectionalLight(0xf06030, 0.25);
fill.position.set(20, 10, 30);
scene.add(fill);

// Street lamps — orange point lights
const lampPositions = [
  [-7, -7], [7, -7], [-7, 7], [7, 7],
  [0, -20], [0, 20], [-20, 0], [20, 0],
];
lampPositions.forEach(([x, z]) => {
  const light = new THREE.PointLight(0xf0a030, 1.2, 14, 2);
  light.position.set(x, 4, z);
  scene.add(light);

  // Lamp post mesh
  const postGeo = new THREE.CylinderGeometry(0.08, 0.08, 4, 6);
  const postMat = new THREE.MeshStandardMaterial({ color: 0x222233, roughness: 0.9 });
  const post = new THREE.Mesh(postGeo, postMat);
  post.position.set(x, 2, z);
  post.receiveShadow = true;
  scene.add(post);

  // Lamp head
  const headGeo = new THREE.SphereGeometry(0.2, 8, 6);
  const headMat = new THREE.MeshStandardMaterial({
    color: 0xf0a030, emissive: 0xf0a030, emissiveIntensity: 1.5,
    roughness: 0.3
  });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(x, 4, z);
  scene.add(head);
});

/* ── Ground ── */
const groundGeo = new THREE.PlaneGeometry(80, 80, 1, 1);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x0d1018, roughness: 0.95, metalness: 0.0
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

/* ── Roads ── */
function makeRoad(w, h, x, z, ry=0) {
  const geo = new THREE.PlaneGeometry(w, h);
  const mat = new THREE.MeshStandardMaterial({ color: 0x111520, roughness: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.rotation.z = ry;
  mesh.position.set(x, 0.01, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
  return mesh;
}

// Main cross roads
makeRoad(80, 7, 0, 0);   // E-W
makeRoad(7, 80, 0, 0);   // N-S (via rotation)
const nsRoad = makeRoad(80, 7, 0, 0);
nsRoad.rotation.z = Math.PI / 2;

// Road markings (dashed center line)
function addDashes(axis, count, offset) {
  for (let i = 0; i < count; i++) {
    const geo = new THREE.PlaneGeometry(axis === 'x' ? 2 : 0.2, axis === 'x' ? 0.2 : 2);
    const mat = new THREE.MeshStandardMaterial({ color: 0xf0c040, roughness: 1.0 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.rotation.x = -Math.PI / 2;
    const pos = -36 + i * 5.5;
    mesh.position.set(
      axis === 'x' ? pos : offset,
      0.02,
      axis === 'z' ? pos : offset
    );
    scene.add(mesh);
  }
}
addDashes('x', 14, 0);  // E-W dashes
addDashes('z', 14, 0);  // N-S dashes

/* ── Block paving ── */
function makeBlock(x, z, size=12) {
  const geo = new THREE.PlaneGeometry(size, size);
  const mat = new THREE.MeshStandardMaterial({ color: 0x0e1420, roughness: 0.85 });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, 0.005, z);
  mesh.receiveShadow = true;
  scene.add(mesh);
}
makeBlock(-13, -13, 14);
makeBlock( 13, -13, 14);
makeBlock(-13,  13, 14);
makeBlock( 13,  13, 14);

/* ──────────────────────────────────────────────
   LOADING BUILDINGS
────────────────────────────────────────────────*/
const loader = new THREE.GLTFLoader();
const modelCache = {};
const buildingMeshes = []; // for raycasting
let loaded = 0;
const total = CITY.length;
const progressFill = document.getElementById('progress-fill');
const loadStatus   = document.getElementById('load-status');
const statBuildings = document.getElementById('stat-buildings');

function setProgress(n, t) {
  progressFill.style.width = (n / t * 100) + '%';
  loadStatus.textContent = `Yükleniyor: ${n} / ${t}`;
}

function loadModel(modelName, callback) {
  if (modelCache[modelName]) {
    callback(modelCache[modelName].clone());
    return;
  }
  loader.load(
    `./assets/glb/${modelName}.glb`,
    (gltf) => {
      modelCache[modelName] = gltf.scene;
      gltf.scene.traverse(child => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
        }
      });
      callback(gltf.scene.clone());
    },
    undefined,
    (err) => {
      console.warn('Load failed:', modelName, err);
      loaded++;
      setProgress(loaded, total);
      checkDone();
    }
  );
}

function checkDone() {
  if (loaded >= total) {
    setTimeout(() => {
      document.getElementById('loading').classList.add('hidden');
      statBuildings.textContent = buildingMeshes.length;
      drawMinimap();
    }, 400);
  }
}

// Load all city entries
CITY.forEach(([model, x, z, ry, name, type], idx) => {
  loadModel(model, (obj) => {
    obj.position.set(x, 0, z);
    obj.rotation.y = ry;

    // Tag each mesh for raycasting
    obj.traverse(child => {
      if (child.isMesh) {
        child.userData = { name, type, isBuilding: true };
        buildingMeshes.push(child);
      }
    });

    scene.add(obj);
    loaded++;
    setProgress(loaded, total);
    checkDone();
  });
});

/* ──────────────────────────────────────────────
   RAYCASTING — Click / Tap
────────────────────────────────────────────────*/
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const infoPanel = document.getElementById('info-panel');
const infoName  = document.getElementById('info-name');
const infoType  = document.getElementById('info-type');

let selectedObj = null;
let infoTimeout = null;

function onPointerDown(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  mouse.x = ((cx - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((cy - rect.top) / rect.height) * 2 + 1;
}

let pointerMoved = false;

function onPointerMove() { pointerMoved = true; }

function onPointerUp(e) {
  if (pointerMoved) { pointerMoved = false; return; }
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(buildingMeshes, false);
  if (hits.length > 0) {
    const hit = hits[0].object;
    if (hit.userData.isBuilding) {
      infoName.textContent = hit.userData.name;
      infoType.textContent = hit.userData.type;
      infoPanel.style.display = 'block';
      clearTimeout(infoTimeout);
      infoTimeout = setTimeout(() => { infoPanel.style.display = 'none'; }, 3000);
    }
  } else {
    infoPanel.style.display = 'none';
  }
  pointerMoved = false;
}

renderer.domElement.addEventListener('pointerdown', onPointerDown);
renderer.domElement.addEventListener('pointermove', onPointerMove);
renderer.domElement.addEventListener('pointerup',   onPointerUp);
renderer.domElement.addEventListener('touchstart', e => {
  pointerMoved = false;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.touches[0].clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.touches[0].clientY - rect.top) / rect.height) * 2 + 1;
}, { passive: true });

/* ──────────────────────────────────────────────
   ZOOM BUTTONS
────────────────────────────────────────────────*/
document.getElementById('btn-zoom-in').addEventListener('click', () => {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, 3);
  controls.update();
});
document.getElementById('btn-zoom-out').addEventListener('click', () => {
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  camera.position.addScaledVector(dir, -3);
  controls.update();
});

/* ──────────────────────────────────────────────
   MINIMAP
────────────────────────────────────────────────*/
function drawMinimap() {
  const canvas = document.getElementById('minimap-canvas');
  const ctx = canvas.getContext('2d');
  const s = 80;
  ctx.fillStyle = '#080b12';
  ctx.fillRect(0, 0, s, s);

  // Roads
  ctx.fillStyle = '#111520';
  ctx.fillRect(0, s/2 - 4, s, 8);
  ctx.fillRect(s/2 - 4, 0, 8, s);

  // Buildings
  CITY.forEach(([, x, z, , , type]) => {
    const px = (x + 25) / 50 * s;
    const pz = (z + 25) / 50 * s;
    ctx.fillStyle = type === 'Fabrika' ? '#c0603a'
                  : type === 'Depo'   ? '#3a6090'
                  : type === 'İdari'  ? '#507050'
                  : type === 'Tesis'  ? '#707070'
                  : '#555';
    ctx.fillRect(px - 3, pz - 3, 6, 6);
  });

  // Camera dot
  const cx = (camera.position.x + 25) / 50 * s;
  const cz = (camera.position.z + 25) / 50 * s;
  ctx.beginPath();
  ctx.arc(cx, cz, 2.5, 0, Math.PI*2);
  ctx.fillStyle = '#f0c040';
  ctx.fill();
}

/* ──────────────────────────────────────────────
   ANIMATION LOOP
────────────────────────────────────────────────*/
let lastTime = 0;
function animate(time) {
  requestAnimationFrame(animate);
  controls.update();

  // Subtle camera sway
  const dt = time - lastTime;
  lastTime = time;

  renderer.render(scene, camera);

  // Update minimap camera pos every ~30 frames
  if (Math.floor(time / 30) % 3 === 0) drawMinimap();
}
animate(0);

/* ──────────────────────────────────────────────
   RESIZE
────────────────────────────────────────────────*/
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});
</script>
</body>
</html>
